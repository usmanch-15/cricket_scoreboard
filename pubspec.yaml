name: cricket_scoreboard
description: A live cricket scoreboard app with LED stadium theme.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.5.6
  uuid: ^4.4.0
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/splash/splash_logo.png

# Config for the `flutter_native_splash` package. After running
# `flutter pub get`, generate the native (OS-level) splash screen with:
#   dart run flutter_native_splash:create
# Re-run that command any time you change anything in this section.
flutter_native_splash:
  color: "#0E1512"
  image: assets/splash/splash_logo.png
  color_dark: "#0E1512"
  image_dark: assets/splash/splash_logo.png
  android_12:
    image: assets/splash/splash_logo.png
    icon_background_color: "#0E1512"
    image_dark: assets/splash/splash_logo.png
    icon_background_color_dark: "#0E1512"

# Config for the `flutter_launcher_icons` package. After running
# `flutter pub get`, generate the app icon with:
#   dart run flutter_launcher_icons
# Re-run that command any time you change this section or the source image.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/splash/splash_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0E1512"
  adaptive_icon_foreground: "assets/splash/splash_logo.png"